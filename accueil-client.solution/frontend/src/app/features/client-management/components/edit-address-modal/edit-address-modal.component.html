@if (isOpen) {
  <div class="modal-backdrop">
    <dialog class="modal-panel" aria-labelledby="edit-address-title" open>
      <h3 id="edit-address-title">Modifier l'adresse</h3>

      <form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
        <label for="addr-l1">Ligne 1*</label>
        <input id="addr-l1" formControlName="ligne1" type="text" />

        <label for="addr-l2">Ligne 2</label>
        <input id="addr-l2" formControlName="ligne2" type="text" />

        <div class="grid-two">
          <div>
            <label for="addr-cp">Code postal*</label>
            <input id="addr-cp" formControlName="codePostal" type="text" />
          </div>
          <div>
            <label for="addr-ville">Ville*</label>
            <input id="addr-ville" formControlName="ville" type="text" />
          </div>
        </div>

        <footer>
          <button type="button" class="secondary" (click)="onCancel()">Annuler</button>
          <button type="submit" class="primary">Enregistrer</button>
        </footer>
      </form>
    </dialog>
  </div>
}
