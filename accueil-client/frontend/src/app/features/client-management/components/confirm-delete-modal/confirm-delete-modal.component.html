@if (isOpen) {
  <div class="modal-backdrop">
    <dialog class="modal-panel" aria-labelledby="confirm-delete-title" open>
      <h3 id="confirm-delete-title">Supprimer le client</h3>
      <p>Etes-vous sur de vouloir supprimer definitivement la fiche <strong>{{ clientFullName }}</strong> ?</p>
      <p>Cette action est irreversible.</p>

      <footer>
        <button type="button" class="secondary" (click)="onCancel()">Annuler</button>
        <button type="button" class="danger" (click)="onConfirm()">Supprimer</button>
      </footer>
    </dialog>
  </div>
}
