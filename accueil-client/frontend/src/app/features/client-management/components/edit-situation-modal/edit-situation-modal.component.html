@if (isOpen) {
  <div class="modal-backdrop">
    <dialog class="modal-panel" aria-labelledby="edit-situation-title" open>
      <h3 id="edit-situation-title">Modifier la situation familiale</h3>

      <form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
        <label for="sit-status">Situation familiale*</label>
        <select id="sit-status" formControlName="situationFamiliale">
          @for (item of situations; track item) {
            <option [value]="item">{{ item }}</option>
          }
        </select>

        <label for="sit-kids">Nombre d'enfants*</label>
        <input id="sit-kids" formControlName="nombreEnfants" type="number" min="0" max="20" />

        <footer>
          <button type="button" class="secondary" (click)="onCancel()">Annuler</button>
          <button type="submit" class="primary">Enregistrer</button>
        </footer>
      </form>
    </dialog>
  </div>
}
