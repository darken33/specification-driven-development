<section class="clients-board" aria-label="Liste des clients">
  <header class="board-header">
    <h2>Liste des clients</h2>

    <button
      class="new-client-btn"
      type="button"
      aria-label="Creer un nouveau client"
      (click)="onCreateClient()"
    >
      <span aria-hidden="true">+</span>
      Nouveau client
    </button>
  </header>

  <ul class="cards-grid">
    <li *ngFor="let item of items; let i = index; trackBy: trackById">
      <button
        class="client-card"
        type="button"
        (click)="onSelect(item.id)"
        [style.--card-accent]="colorAt(i)"
      >
        <span class="avatar">{{ initials(item.displayName) }}</span>

        <span class="client-meta">
          <span class="identity">
            <strong class="last-name">{{ lastName(item.displayName) }}</strong>
            <span class="first-name">{{ firstName(item.displayName) }}</span>
          </span>

          <span class="location" aria-label="Code postal et ville">
            {{ cityPostalLabel(item.cityPostal) }}
          </span>

          <span class="detail-link">Voir le detail -></span>
        </span>
      </button>
    </li>
  </ul>
</section>
